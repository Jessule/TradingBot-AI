<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recolecta Círculos</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
      overflow: hidden;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 4px;
      margin-bottom: 12px;
      background: linear-gradient(90deg, #ff6ec7, #a78bfa, #38bdf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-transform: uppercase;
    }

    #hud {
      display: flex;
      gap: 40px;
      margin-bottom: 14px;
      font-size: 1.1rem;
      letter-spacing: 1px;
    }

    #hud span { color: #a78bfa; font-weight: 700; }

    #canvas-wrap {
      position: relative;
    }

    canvas {
      display: block;
      border-radius: 16px;
      border: 2px solid #2d2d4e;
      cursor: crosshair;
      box-shadow: 0 0 40px #a78bfa44;
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(15, 15, 26, 0.88);
      border-radius: 16px;
      gap: 18px;
    }

    #overlay h2 {
      font-size: 2.2rem;
      background: linear-gradient(90deg, #ff6ec7, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    #overlay p { font-size: 1.1rem; color: #cbd5e1; text-align: center; line-height: 1.7; }

    #overlay .final-score { font-size: 3rem; font-weight: 800; color: #38bdf8; }

    button {
      padding: 12px 36px;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 2px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      background: linear-gradient(135deg, #a78bfa, #38bdf8);
      color: #0f0f1a;
      transition: transform 0.15s, box-shadow 0.15s;
      text-transform: uppercase;
    }

    button:hover { transform: scale(1.06); box-shadow: 0 0 20px #a78bfa88; }

    #combo-popup {
      position: absolute;
      top: 0; left: 0;
      pointer-events: none;
      font-size: 1.4rem;
      font-weight: 800;
      color: #ffd700;
      text-shadow: 0 0 10px #ffd70099;
      opacity: 0;
      transition: opacity 0.2s;
    }
  </style>
</head>
<body>

<h1>Recolecta Círculos</h1>

<div id="hud">
  <div>Puntos: <span id="score">0</span></div>
  <div>Nivel: <span id="level">1</span></div>
  <div>Tiempo: <span id="timer">30</span>s</div>
  <div>Combo: <span id="combo">x1</span></div>
</div>

<div id="canvas-wrap">
  <canvas id="canvas" width="700" height="480"></canvas>
  <div id="overlay">
    <h2>Recolecta Círculos</h2>
    <p>Haz clic en los círculos antes de que desaparezcan.<br>
       Los círculos <b style="color:#ff6ec7">rosados</b> valen más puntos.<br>
       ¡Encadena clics para multiplicar tu puntaje!</p>
    <button id="btn">Jugar</button>
  </div>
  <div id="combo-popup"></div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const levelEl = document.getElementById('level');
const timerEl = document.getElementById('timer');
const comboEl = document.getElementById('combo');
const overlay = document.getElementById('overlay');
const btn = document.getElementById('btn');
const comboPopup = document.getElementById('combo-popup');

const W = canvas.width;
const H = canvas.height;

const CIRCLE_TYPES = [
  { color: '#38bdf8', glow: '#38bdf888', radius: 28, points: 10, speed: 1.2, lifespan: 4500 },
  { color: '#a78bfa', glow: '#a78bfa88', radius: 22, points: 20, speed: 1.8, lifespan: 3500 },
  { color: '#ff6ec7', glow: '#ff6ec788', radius: 16, points: 40, speed: 2.5, lifespan: 2500 },
  { color: '#fbbf24', glow: '#fbbf2488', radius: 12, points: 80, speed: 3.2, lifespan: 1800 },
];

let circles = [];
let score = 0;
let level = 1;
let timeLeft = 30;
let combo = 1;
let comboTimer = null;
let running = false;
let animId = null;
let spawnInterval = null;
let countdownInterval = null;
let particles = [];
let lastTime = 0;

function rand(min, max) { return Math.random() * (max - min) + min; }

function spawnCircle() {
  const weights = [50, 30, 15, 5];
  const total = weights.reduce((a, b) => a + b, 0);
  let r = Math.random() * total;
  let typeIdx = 0;
  for (let i = 0; i < weights.length; i++) {
    r -= weights[i];
    if (r <= 0) { typeIdx = i; break; }
  }

  const type = CIRCLE_TYPES[typeIdx];
  const radius = type.radius;
  const angle = Math.random() * Math.PI * 2;
  const speedMult = 1 + (level - 1) * 0.15;
  const speed = type.speed * speedMult;

  circles.push({
    x: rand(radius, W - radius),
    y: rand(radius, H - radius),
    radius,
    color: type.color,
    glow: type.glow,
    points: type.points,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    born: performance.now(),
    lifespan: type.lifespan,
    alpha: 1,
    pulse: rand(0, Math.PI * 2),
  });
}

function spawnParticles(x, y, color, count = 10) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count + rand(-0.3, 0.3);
    const speed = rand(2, 6);
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      color,
      alpha: 1,
      radius: rand(3, 7),
    });
  }
}

function updateCombo() {
  comboEl.textContent = `x${combo}`;
  clearTimeout(comboTimer);
  comboTimer = setTimeout(() => {
    combo = 1;
    comboEl.textContent = 'x1';
  }, 1500);
}

function showComboPopup(x, y, pts) {
  comboPopup.style.left = (x - 20) + 'px';
  comboPopup.style.top = (y - 40) + 'px';
  comboPopup.textContent = `+${pts}${combo > 1 ? ` x${combo}` : ''}`;
  comboPopup.style.opacity = '1';
  clearTimeout(comboPopup._t);
  comboPopup._t = setTimeout(() => { comboPopup.style.opacity = '0'; }, 700);
}

canvas.addEventListener('click', (e) => {
  if (!running) return;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  let hit = false;
  for (let i = circles.length - 1; i >= 0; i--) {
    const c = circles[i];
    const dx = mx - c.x, dy = my - c.y;
    if (Math.sqrt(dx * dx + dy * dy) <= c.radius) {
      const earned = c.points * combo;
      score += earned;
      scoreEl.textContent = score;
      combo++;
      updateCombo();
      showComboPopup(c.x, c.y, earned);
      spawnParticles(c.x, c.y, c.color, 14);
      circles.splice(i, 1);
      hit = true;
      break;
    }
  }

  if (!hit) {
    combo = 1;
    comboEl.textContent = 'x1';
    clearTimeout(comboTimer);
  }
});

function update(now) {
  const dt = Math.min((now - lastTime) / 16.67, 3);
  lastTime = now;

  for (let i = circles.length - 1; i >= 0; i--) {
    const c = circles[i];
    c.x += c.vx * dt;
    c.y += c.vy * dt;

    if (c.x - c.radius < 0) { c.x = c.radius; c.vx *= -1; }
    if (c.x + c.radius > W) { c.x = W - c.radius; c.vx *= -1; }
    if (c.y - c.radius < 0) { c.y = c.radius; c.vy *= -1; }
    if (c.y + c.radius > H) { c.y = H - c.radius; c.vy *= -1; }

    const age = now - c.born;
    if (age > c.lifespan) {
      circles.splice(i, 1);
      continue;
    }
    const fadeStart = c.lifespan * 0.7;
    c.alpha = age > fadeStart ? 1 - (age - fadeStart) / (c.lifespan - fadeStart) : 1;
    c.pulse = (c.pulse + 0.06 * dt) % (Math.PI * 2);
  }

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 0.15 * dt;
    p.alpha -= 0.03 * dt;
    if (p.alpha <= 0) particles.splice(i, 1);
  }
}

function draw(now) {
  ctx.clearRect(0, 0, W, H);

  ctx.fillStyle = '#0f0f1a';
  ctx.fillRect(0, 0, W, H);

  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.alpha);
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.fill();
    ctx.restore();
  }

  for (const c of circles) {
    const pulse = 1 + Math.sin(c.pulse) * 0.07;
    ctx.save();
    ctx.globalAlpha = c.alpha;

    ctx.shadowColor = c.glow;
    ctx.shadowBlur = 24 * pulse;
    ctx.beginPath();
    ctx.arc(c.x, c.y, c.radius * pulse, 0, Math.PI * 2);
    ctx.fillStyle = c.color;
    ctx.fill();

    ctx.shadowBlur = 0;
    ctx.strokeStyle = '#ffffff33';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();
  }
}

function loop(now) {
  update(now);
  draw(now);
  if (running) animId = requestAnimationFrame(loop);
}

function startGame() {
  circles = [];
  particles = [];
  score = 0;
  level = 1;
  timeLeft = 30;
  combo = 1;
  running = true;
  scoreEl.textContent = '0';
  levelEl.textContent = '1';
  timerEl.textContent = '30';
  comboEl.textContent = 'x1';

  overlay.style.display = 'none';

  clearInterval(spawnInterval);
  clearInterval(countdownInterval);

  spawnInterval = setInterval(() => {
    if (!running) return;
    const count = 1 + Math.floor(level / 3);
    for (let i = 0; i < count; i++) spawnCircle();
  }, Math.max(500, 1200 - level * 60));

  countdownInterval = setInterval(() => {
    timeLeft--;
    timerEl.textContent = timeLeft;
    if (timeLeft % 10 === 0 && timeLeft > 0) {
      level++;
      levelEl.textContent = level;
      clearInterval(spawnInterval);
      spawnInterval = setInterval(() => {
        if (!running) return;
        const count = 1 + Math.floor(level / 3);
        for (let i = 0; i < count; i++) spawnCircle();
      }, Math.max(500, 1200 - level * 60));
    }
    if (timeLeft <= 0) endGame();
  }, 1000);

  lastTime = performance.now();
  animId = requestAnimationFrame(loop);
}

function endGame() {
  running = false;
  clearInterval(spawnInterval);
  clearInterval(countdownInterval);
  cancelAnimationFrame(animId);

  overlay.innerHTML = `
    <h2>¡Tiempo!</h2>
    <div class="final-score">${score} pts</div>
    <p>Llegaste al nivel <b style="color:#a78bfa">${level}</b>.<br>
       Recolectaste círculos con un combo máximo increíble.</p>
    <button id="btn">Jugar de nuevo</button>
  `;
  overlay.style.display = 'flex';
  document.getElementById('btn').addEventListener('click', startGame);
}

btn.addEventListener('click', startGame);

ctx.fillStyle = '#0f0f1a';
ctx.fillRect(0, 0, W, H);
</script>
</body>
</html>
