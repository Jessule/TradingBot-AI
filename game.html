<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recolecta Círculos</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a14;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
      overflow: hidden;
      user-select: none;
    }

    h1 {
      font-size: 1.6rem;
      letter-spacing: 6px;
      margin-bottom: 10px;
      color: #38bdf8;
      text-transform: uppercase;
      text-shadow: 0 0 20px #38bdf866;
    }

    #hud {
      display: flex;
      gap: 48px;
      margin-bottom: 12px;
      font-size: 1rem;
      letter-spacing: 1px;
      color: #94a3b8;
    }

    #hud .val { color: #e2e8f0; font-weight: 700; font-size: 1.3rem; }
    #hud .lbl { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; color: #64748b; margin-top: 2px; }
    #hud .col { display: flex; flex-direction: column; align-items: center; }

    #lives { display: flex; gap: 6px; align-items: center; }
    .heart { width: 16px; height: 16px; background: #ef4444; border-radius: 50% 50% 0 0; position: relative; transform: rotate(-45deg); transition: all 0.2s; }
    .heart::after { content: ''; position: absolute; width: 16px; height: 16px; background: #ef4444; border-radius: 50%; left: 50%; top: 0; transform: translateX(-50%); }
    .heart.lost { background: #1e293b; }
    .heart.lost::after { background: #1e293b; }

    #canvas-wrap { position: relative; }

    canvas {
      display: block;
      border-radius: 14px;
      border: 1.5px solid #1e293b;
      cursor: crosshair;
      box-shadow: 0 0 60px #38bdf81a;
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(10, 10, 20, 0.92);
      border-radius: 14px;
      gap: 16px;
      backdrop-filter: blur(4px);
    }

    #overlay h2 { font-size: 2rem; color: #38bdf8; letter-spacing: 2px; }
    #overlay .sub { font-size: 1rem; color: #64748b; text-align: center; line-height: 1.8; }
    #overlay .big { font-size: 4rem; font-weight: 900; color: #e2e8f0; line-height: 1; }
    #overlay .label { font-size: 0.8rem; color: #64748b; letter-spacing: 3px; text-transform: uppercase; }

    .milestone-banner {
      position: absolute;
      top: 0; left: 0; right: 0;
      text-align: center;
      padding: 10px;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: #0a0a14;
      background: #38bdf8;
      border-radius: 14px 14px 0 0;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    button {
      padding: 11px 40px;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 3px;
      border: 1.5px solid #38bdf8;
      border-radius: 50px;
      cursor: pointer;
      background: transparent;
      color: #38bdf8;
      text-transform: uppercase;
      transition: all 0.15s;
    }

    button:hover { background: #38bdf8; color: #0a0a14; box-shadow: 0 0 20px #38bdf855; }

    #score-popup {
      position: absolute;
      pointer-events: none;
      font-size: 1.1rem;
      font-weight: 800;
      color: #38bdf8;
      text-shadow: 0 0 10px #38bdf8;
      opacity: 0;
      transition: opacity 0.15s;
    }
  </style>
</head>
<body>

<h1>Círculos</h1>

<div id="hud">
  <div class="col">
    <div class="val" id="score">0</div>
    <div class="lbl">recolectados</div>
  </div>
  <div class="col">
    <div class="val" id="level">1</div>
    <div class="lbl">nivel</div>
  </div>
  <div class="col">
    <div id="lives">
      <div class="heart" id="h1"></div>
      <div class="heart" id="h2"></div>
      <div class="heart" id="h3"></div>
    </div>
    <div class="lbl" style="margin-top:6px">vidas</div>
  </div>
  <div class="col">
    <div class="val" id="best">0</div>
    <div class="lbl">mejor</div>
  </div>
</div>

<div id="canvas-wrap">
  <canvas id="canvas" width="680" height="460"></canvas>
  <div class="milestone-banner" id="banner"></div>

  <div id="overlay">
    <h2>Recolecta Círculos</h2>
    <p class="sub">
      Haz clic en los círculos antes de que desaparezcan.<br>
      Cada 10 que recolectes el juego sube de nivel.<br>
      Pierdes una vida si se escapa un círculo. ¡3 vidas!
    </p>
    <button id="btn">Empezar</button>
  </div>

  <div id="score-popup"></div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const scoreEl  = document.getElementById('score');
const levelEl  = document.getElementById('level');
const bestEl   = document.getElementById('best');
const overlay  = document.getElementById('overlay');
const btn      = document.getElementById('btn');
const banner   = document.getElementById('banner');
const popup    = document.getElementById('score-popup');
const hearts   = [document.getElementById('h1'), document.getElementById('h2'), document.getElementById('h3')];

const W = canvas.width;
const H = canvas.height;

let circles = [], particles = [];
let score = 0, level = 1, lives = 3, best = 0;
let collected = 0;
let running = false;
let animId = null, spawnTimer = null;
let lastTime = 0;

function rand(a, b) { return Math.random() * (b - a) + a; }

function getConfig() {
  const spd  = 1.2 + (level - 1) * 0.22;
  const life = Math.max(1600, 4000 - (level - 1) * 180);
  const rate = Math.max(600,  2000 - (level - 1) * 120);
  const r    = Math.max(14, 24 - Math.floor((level - 1) / 3));
  return { spd, life, rate, r };
}

function spawnCircle() {
  if (!running) return;
  const { spd, life, r } = getConfig();
  const angle = rand(0, Math.PI * 2);
  circles.push({
    x: rand(r + 4, W - r - 4),
    y: rand(r + 4, H - r - 4),
    r,
    vx: Math.cos(angle) * spd,
    vy: Math.sin(angle) * spd,
    born: performance.now(),
    life,
    alpha: 1,
    pulse: rand(0, Math.PI * 2),
    popped: false,
  });
  scheduleSpawn();
}

function scheduleSpawn() {
  clearTimeout(spawnTimer);
  const { rate } = getConfig();
  spawnTimer = setTimeout(spawnCircle, rate + rand(-100, 100));
}

function spawnParticles(x, y) {
  for (let i = 0; i < 12; i++) {
    const a = (Math.PI * 2 * i) / 12 + rand(-0.2, 0.2);
    const spd = rand(2, 5);
    particles.push({ x, y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd, alpha: 1, r: rand(2, 5) });
  }
}

function showPopup(x, y, text) {
  popup.textContent = text;
  popup.style.left = (x - 16) + 'px';
  popup.style.top  = (y - 36) + 'px';
  popup.style.opacity = '1';
  clearTimeout(popup._t);
  popup._t = setTimeout(() => { popup.style.opacity = '0'; }, 600);
}

function showBanner(text) {
  banner.textContent = text;
  banner.style.opacity = '1';
  clearTimeout(banner._t);
  banner._t = setTimeout(() => { banner.style.opacity = '0'; }, 1400);
}

function loseLife() {
  lives--;
  const h = hearts[lives];
  if (h) h.classList.add('lost');
  if (lives <= 0) endGame();
}

function updateHearts() {
  hearts.forEach((h, i) => {
    h.classList.toggle('lost', i >= lives);
  });
}

canvas.addEventListener('click', (e) => {
  if (!running) return;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  for (let i = circles.length - 1; i >= 0; i--) {
    const c = circles[i];
    if (c.popped) continue;
    const dx = mx - c.x, dy = my - c.y;
    if (dx*dx + dy*dy <= c.r*c.r) {
      c.popped = true;
      collected++;
      score = collected;
      scoreEl.textContent = score;
      spawnParticles(c.x, c.y);
      showPopup(c.x, c.y, '+1');

      if (score > best) { best = score; bestEl.textContent = best; }

      const newLevel = Math.floor(collected / 10) + 1;
      if (newLevel > level) {
        level = newLevel;
        levelEl.textContent = level;
        showBanner(`NIVEL ${level} — ¡MÁS RÁPIDO!`);
      }
      break;
    }
  }
});

function update(now) {
  const dt = Math.min((now - lastTime) / 16.67, 3);
  lastTime = now;

  for (let i = circles.length - 1; i >= 0; i--) {
    const c = circles[i];
    if (c.popped) { circles.splice(i, 1); continue; }

    c.x += c.vx * dt;
    c.y += c.vy * dt;
    if (c.x - c.r < 0)   { c.x = c.r;   c.vx *= -1; }
    if (c.x + c.r > W)   { c.x = W-c.r; c.vx *= -1; }
    if (c.y - c.r < 0)   { c.y = c.r;   c.vy *= -1; }
    if (c.y + c.r > H)   { c.y = H-c.r; c.vy *= -1; }

    const age = now - c.born;
    if (age >= c.life) {
      circles.splice(i, 1);
      loseLife();
      continue;
    }
    const fadeAt = c.life * 0.65;
    c.alpha = age > fadeAt ? 1 - (age - fadeAt) / (c.life - fadeAt) : 1;
    c.pulse = (c.pulse + 0.055 * dt) % (Math.PI * 2);
  }

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x  += p.vx * dt;
    p.y  += p.vy * dt;
    p.vy += 0.12 * dt;
    p.alpha -= 0.028 * dt;
    if (p.alpha <= 0) particles.splice(i, 1);
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#0a0a14';
  ctx.fillRect(0, 0, W, H);

  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.alpha);
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = '#38bdf8';
    ctx.fill();
    ctx.restore();
  }

  for (const c of circles) {
    const pulse = 1 + Math.sin(c.pulse) * 0.06;
    const pr = c.r * pulse;

    ctx.save();
    ctx.globalAlpha = c.alpha;

    const grad = ctx.createRadialGradient(c.x, c.y, 0, c.x, c.y, pr);
    grad.addColorStop(0,   '#7dd3fc');
    grad.addColorStop(0.5, '#38bdf8');
    grad.addColorStop(1,   '#0ea5e9');

    ctx.shadowColor = '#38bdf8';
    ctx.shadowBlur  = 18 * pulse;
    ctx.beginPath();
    ctx.arc(c.x, c.y, pr, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    ctx.shadowBlur = 0;
    ctx.strokeStyle = `rgba(255,255,255,${0.25 * c.alpha})`;
    ctx.lineWidth = 1.5;
    ctx.stroke();

    const age = performance.now() - c.born;
    const ratio = Math.min(age / c.life, 1);
    ctx.beginPath();
    ctx.arc(c.x, c.y, pr + 5, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * (1 - ratio));
    ctx.strokeStyle = `rgba(56,189,248,${0.5 * c.alpha})`;
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.restore();
  }
}

function loop(now) {
  update(now);
  draw();
  if (running) animId = requestAnimationFrame(loop);
}

function startGame() {
  circles = []; particles = [];
  score = 0; level = 1; lives = 3; collected = 0;
  running = true;
  scoreEl.textContent = '0';
  levelEl.textContent = '1';
  updateHearts();
  overlay.style.display = 'none';
  scheduleSpawn();
  lastTime = performance.now();
  animId = requestAnimationFrame(loop);
}

function endGame() {
  running = false;
  clearTimeout(spawnTimer);
  cancelAnimationFrame(animId);

  overlay.innerHTML = `
    <div class="label">Juego terminado</div>
    <div class="big">${score}</div>
    <div class="label">recolectados — nivel ${level}</div>
    <p class="sub" style="margin-top:4px">
      ${score > 0 && score === best ? '¡Nuevo récord personal!' : `Tu mejor marca es ${best}`}
    </p>
    <button id="btn">Jugar de nuevo</button>
  `;
  overlay.style.display = 'flex';
  document.getElementById('btn').addEventListener('click', startGame);
}

btn.addEventListener('click', startGame);
ctx.fillStyle = '#0a0a14';
ctx.fillRect(0, 0, W, H);
</script>
</body>
</html>
