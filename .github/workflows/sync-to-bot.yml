name: Sync to jessule/bot

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tradingbot-ai
        uses: actions/checkout@v4

      - name: Clone jessule/bot and sync files
        env:
          PAT: ${{ secrets.BOT_PAT }}
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"

          git clone https://x-access-token:${PAT}@github.com/jessule/bot.git bot-repo

          cp index.html bot-repo/
          cp t212-account.html bot-repo/
          mkdir -p bot-repo/css bot-repo/js
          cp css/style.css bot-repo/css/
          cp js/storage.js js/chart.js js/trading.js js/ai.js js/app.js bot-repo/js/

          cd bot-repo
          git add -A
          git diff --staged --quiet && echo "Nothing to sync" && exit 0
          git commit -m "Sync TradeBot AI from tradingbot-ai"
          git push origin main
