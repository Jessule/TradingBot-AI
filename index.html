<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>FLUX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#050810;--panel:rgba(0,212,255,.05);--bord:rgba(0,212,255,.2);--p:#00d4ff;--s:#9b5de5;--acc:#ff0066;--gold:#ffcc00;--grn:#00f5a0;--text:#c8e8f8;--dim:#263d52;--font:'Quicksand',system-ui,sans-serif;}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{width:100%;height:100%;background:var(--bg);overflow:hidden;font-family:var(--font);color:var(--text);touch-action:none;}
    #hud{position:fixed;top:0;left:0;right:0;z-index:10;padding:max(10px,env(safe-area-inset-top)) 10px 0;background:linear-gradient(to bottom,rgba(5,8,16,.98) 70%,transparent);}
    .hud-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-bottom:6px;}
    .hud-cell{background:var(--panel);border:1px solid var(--bord);border-radius:10px;padding:8px 4px 6px;text-align:center;position:relative;overflow:hidden;}
    .hud-cell::before,.hud-cell::after{content:'';position:absolute;width:7px;height:7px;border-color:var(--p);border-style:solid;opacity:.5;}
    .hud-cell::before{top:2px;left:2px;border-width:1.5px 0 0 1.5px;}
    .hud-cell::after{bottom:2px;right:2px;border-width:0 1.5px 1.5px 0;}
    .hud-val{font-size:1.3rem;font-weight:800;color:var(--p);line-height:1;letter-spacing:-.5px;transition:color .15s,text-shadow .15s;}
    .hud-val.flash{color:#fff;text-shadow:0 0 16px var(--p),0 0 32px var(--p);}
    .hud-lbl{font-size:.52rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--dim);margin-top:3px;}
    #lives-row{display:flex;justify-content:center;gap:4px;align-items:center;height:1.3rem;}
    .heart{font-size:.9rem;transition:all .2s;filter:drop-shadow(0 0 5px #ff0066);}
    .heart.lost{filter:none;opacity:.15;}
    .xp-wrap{margin-bottom:4px;}
    .xp-bar{height:3px;background:rgba(0,212,255,.08);border-radius:99px;position:relative;overflow:visible;}
    .xp-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--s),var(--p));transition:width .35s ease;box-shadow:0 0 8px var(--p);position:relative;}
    .xp-fill::after{content:'';position:absolute;right:-3px;top:50%;transform:translateY(-50%);width:8px;height:8px;background:var(--p);border-radius:50%;box-shadow:0 0 10px var(--p),0 0 22px var(--p);}
    .xp-text{font-size:.52rem;font-weight:700;color:var(--dim);text-align:center;letter-spacing:1px;margin-top:3px;margin-bottom:7px;text-transform:uppercase;}
    canvas{position:fixed;top:0;left:0;touch-action:none;}
    #banner{position:fixed;top:0;left:0;right:0;z-index:30;padding:max(8px,env(safe-area-inset-top)) 12px 12px;font-family:var(--font);font-size:.82rem;font-weight:800;letter-spacing:3px;text-transform:uppercase;text-align:center;color:var(--bg);background:linear-gradient(90deg,var(--s),var(--p),var(--grn));opacity:0;transform:translateY(-110%);transition:all .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;}
    #banner.show{opacity:1;transform:translateY(0);}
    #popup{position:fixed;z-index:15;pointer-events:none;font-family:var(--font);font-size:1rem;font-weight:800;opacity:0;transition:opacity .15s;}
    #overlay{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:13px;padding:max(28px,env(safe-area-inset-top)) 20px 24px;background:rgba(5,8,16,.94);backdrop-filter:blur(10px);font-family:var(--font);overflow:hidden;}
    #overlay::before{content:'';position:absolute;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--p),transparent);animation:scan 4s linear infinite;pointer-events:none;}
    @keyframes scan{0%{top:0;opacity:0}5%{opacity:1}95%{opacity:1}100%{top:100%;opacity:0}}
    #overlay::after{content:'';position:absolute;inset:12px;border:1px solid rgba(0,212,255,.1);border-radius:16px;pointer-events:none;}
    .ov-eye{font-size:.62rem;font-weight:700;letter-spacing:5px;text-transform:uppercase;color:var(--dim);}
    .ov-title{font-size:3rem;font-weight:800;letter-spacing:10px;text-transform:uppercase;line-height:1;margin-top:-4px;background:linear-gradient(135deg,var(--p),var(--s),var(--acc));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .ov-big{font-size:4.5rem;font-weight:800;line-height:1;letter-spacing:-2px;margin-top:2px;background:linear-gradient(135deg,var(--p),var(--grn));-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 14px rgba(0,212,255,.4));}
    .ov-sub{font-size:.7rem;font-weight:700;color:var(--dim);letter-spacing:3px;text-transform:uppercase;margin-top:-6px;}
    .ov-hint{font-size:.85rem;color:#3a5a72;text-align:center;line-height:2;max-width:272px;font-weight:600;}
    .orb-legend{display:flex;gap:12px;align-items:center;}
    .orb-pip{display:flex;align-items:center;gap:5px;font-size:.7rem;font-weight:700;}
    .orb-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
    .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%;max-width:310px;}
    .sc{background:rgba(0,212,255,.04);border:1px solid rgba(0,212,255,.2);border-radius:12px;padding:12px 6px;text-align:center;position:relative;}
    .sc::before,.sc::after{content:'';position:absolute;width:5px;height:5px;border-color:var(--p);border-style:solid;opacity:.4;}
    .sc::before{top:3px;left:3px;border-width:1px 0 0 1px;}
    .sc::after{bottom:3px;right:3px;border-width:0 1px 1px 0;}
    .sc .v{font-size:1.15rem;font-weight:800;color:var(--p);}
    .sc .l{font-size:.52rem;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-top:3px;}
    .rec-pill{padding:6px 22px;border-radius:99px;color:#fff;background:linear-gradient(90deg,var(--s),var(--acc));font-size:.68rem;font-weight:800;letter-spacing:3px;text-transform:uppercase;animation:gpill 1.2s ease infinite alternate;}
    @keyframes gpill{from{box-shadow:0 0 10px var(--s)}to{box-shadow:0 0 24px var(--s),0 0 42px var(--acc)}}
    button{padding:15px 44px;font-family:var(--font);font-size:.88rem;font-weight:800;letter-spacing:4px;text-transform:uppercase;border:1.5px solid var(--p);border-radius:99px;background:transparent;color:var(--p);cursor:pointer;min-width:190px;transition:all .15s;animation:pbtn 2.5s ease infinite;}
    @keyframes pbtn{0%,100%{box-shadow:0 0 8px rgba(0,212,255,.25)}50%{box-shadow:0 0 22px rgba(0,212,255,.55),0 0 44px rgba(0,212,255,.15)}}
    button:active{background:var(--p);color:var(--bg);transform:scale(.97);box-shadow:none;}
    #flash-overlay{position:fixed;inset:0;z-index:25;pointer-events:none;background:rgba(255,0,102,.18);opacity:0;transition:opacity .08s;}
    #flash-overlay.show{opacity:1;}
  </style>
</head>
<body>
<div id="hud">
  <div class="hud-row">
    <div class="hud-cell"><div class="hud-val" id="flux-el">0</div><div class="hud-lbl">FLUX</div></div>
    <div class="hud-cell"><div class="hud-val" id="level-el">1</div><div class="hud-lbl">LEVEL</div></div>
    <div class="hud-cell"><div id="lives-row"><span class="heart" id="h1">♥</span><span class="heart" id="h2">♥</span><span class="heart" id="h3">♥</span></div><div class="hud-lbl">LIVES</div></div>
    <div class="hud-cell"><div class="hud-val" id="mult-el">×1</div><div class="hud-lbl">MULT</div></div>
  </div>
  <div class="xp-wrap">
    <div class="xp-bar"><div class="xp-fill" id="xp-fill" style="width:0%"></div></div>
    <div class="xp-text" id="xp-text">0 / 10 orbs to level up</div>
  </div>
</div>
<canvas id="canvas"></canvas>
<div id="banner"></div>
<div id="popup"></div>
<div id="flash-overlay"></div>
<div id="overlay">
  <div class="ov-eye">Orb Collection System</div>
  <div class="ov-title">FLUX</div>
  <p class="ov-hint">Tap orbs before they expire — each miss costs a life.<br>Every level: ×1.25 more flux per tap.<br>Each level requires ×1.4 more orbs than the last.</p>
  <div class="orb-legend">
    <div class="orb-pip"><div class="orb-dot" style="background:#00d4ff;box-shadow:0 0 6px #00d4ff"></div><span style="color:#00d4ff">Normal</span></div>
    <div class="orb-pip"><div class="orb-dot" style="background:#ffcc00;box-shadow:0 0 6px #ffcc00"></div><span style="color:#ffcc00">Boost ×5</span></div>
    <div class="orb-pip"><div class="orb-dot" style="background:#00f5a0;box-shadow:0 0 6px #00f5a0"></div><span style="color:#00f5a0">Shield +♥</span></div>
  </div>
  <div class="stats-grid" id="start-stats" style="display:none"></div>
  <button id="btn">START</button>
</div>
<script>
const LV_COLORS=['#00d4ff','#00b8ff','#4499ff','#7b6fff','#9b5de5','#c040d0','#ff0099','#ff0055','#ff3311','#ff7700','#ffcc00','#00f5a0'];
function lvCol(l){return LV_COLORS[Math.min(l-1,LV_COLORS.length-1)];}
const ORB={NORMAL:{fluxMult:1,color:null,glyph:null,shield:false,lifeScale:1},BOOST:{fluxMult:5,color:'#ffcc00',glyph:'×5',shield:false,lifeScale:.75},SHIELD:{fluxMult:0,color:'#00f5a0',glyph:'♥',shield:true,lifeScale:.85}};
function pickType(){const r=Math.random();if(r<.03)return 'SHIELD';if(r<.10)return 'BOOST';return 'NORMAL';}
const BASE_XP=10,XP_SCALE=1.4,MPL=1.25;
function xpToNext(lv){return Math.ceil(BASE_XP*Math.pow(XP_SCALE,lv-1));}
function multAt(lv){return Math.pow(MPL,lv-1);}
function fluxGain(lv,t){return multAt(lv)*ORB[t].fluxMult;}
function fmtMult(lv){const m=multAt(lv);if(m>=1000)return '×'+(m/1000).toFixed(1)+'K';if(m>=100)return '×'+Math.round(m);if(m>=10)return '×'+m.toFixed(1);return '×'+m.toFixed(2);}
function fmtNum(n){if(n>=1e9)return (n/1e9).toFixed(2)+'B';if(n>=1e6)return (n/1e6).toFixed(2)+'M';if(n>=1e3)return (n/1e3).toFixed(1)+'K';return Math.floor(n).toString();}
const KEY='flux_v3';
const stor={load(){try{return JSON.parse(localStorage.getItem(KEY))||{};}catch{return{};}},save(d){try{const c=this.load();localStorage.setItem(KEY,JSON.stringify({...c,...d}));}catch{}}};
const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
const overlay=document.getElementById('overlay'),banner=document.getElementById('banner'),popup=document.getElementById('popup'),flashOv=document.getElementById('flash-overlay');
const fluxEl=document.getElementById('flux-el'),levelEl=document.getElementById('level-el'),multEl=document.getElementById('mult-el'),xpFill=document.getElementById('xp-fill'),xpText=document.getElementById('xp-text');
const hearts=['h1','h2','h3'].map(id=>document.getElementById(id));
const startStats=document.getElementById('start-stats');
let HUD_H=0,W=0,H=0;
function resize(){HUD_H=document.getElementById('hud').getBoundingClientRect().height;W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
resize();window.addEventListener('resize',()=>{resize();if(running)spawnOrb();});
let orbs=[],particles=[],flux=0,xp=0,level=1,lives=3,running=false,animId=null,spawnTimer=null,lastTime=0,streak=0;
function getConf(){return{speed:1.2+(level-1)*.2,life:Math.max(1400,4800-(level-1)*160),rate:Math.max(550,2400-(level-1)*120),radius:Math.max(18,32-Math.floor((level-1)/3)*2)};}
function rand(a,b){return Math.random()*(b-a)+a;}
function spawnOrb(ft){if(!running)return;const type=ft||pickType();const cfg=getConf();const R=cfg.radius*(type==='BOOST'?1.25:type==='SHIELD'?1.15:1);const a=Math.random()*Math.PI*2;orbs.push({x:rand(R+12,W-R-12),y:rand(HUD_H+R+12,H-R-12),r:R,vx:Math.cos(a)*cfg.speed*(type==='BOOST'?1.3:1),vy:Math.sin(a)*cfg.speed*(type==='BOOST'?1.3:1),born:performance.now(),life:cfg.life*ORB[type].lifeScale,alpha:1,phase:rand(0,Math.PI*2),type,popped:false,escaped:false,escapeT:0});scheduleSpawn();}
function scheduleSpawn(){clearTimeout(spawnTimer);spawnTimer=setTimeout(spawnOrb,getConf().rate+rand(-80,80));}
const PAR_POOL=['#00d4ff','#9b5de5','#ff0066','#00f5a0','#fff','#ffcc00'];
function burst(x,y,color,count=18){for(let i=0;i<count;i++){const a=(Math.PI*2*i)/count+rand(-.2,.2),s=rand(3,8);const c=Math.random()<.5?color:PAR_POOL[Math.floor(Math.random()*PAR_POOL.length)];particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,alpha:1,r:rand(2,5.5),color:c});}}
function flash(el,dur=220){el.classList.add('flash');clearTimeout(el._ft);el._ft=setTimeout(()=>el.classList.remove('flash'),dur);}
function showPopup(x,y,text,color){popup.textContent=text;popup.style.cssText=`left:${x-16}px;top:${y-48}px;opacity:1;color:${color};text-shadow:0 0 14px ${color}`;clearTimeout(popup._t);popup._t=setTimeout(()=>popup.style.opacity='0',750);}
function showBanner(text){banner.textContent=text;banner.classList.add('show');clearTimeout(banner._t);banner._t=setTimeout(()=>banner.classList.remove('show'),2000);}
function screenFlash(){flashOv.classList.add('show');clearTimeout(flashOv._t);flashOv._t=setTimeout(()=>flashOv.classList.remove('show'),180);}
function updateHUD(){const needed=xpToNext(level);fluxEl.textContent=fmtNum(flux);levelEl.textContent=level;multEl.textContent=fmtMult(level);xpFill.style.width=Math.min(xp/needed*100,100).toFixed(1)+'%';xpText.textContent=`${xp} / ${needed} orbs to level up`;hearts.forEach((h,i)=>h.classList.toggle('lost',i>=lives));}
function handleTap(ex,ey){if(!running)return;for(let i=orbs.length-1;i>=0;i--){const o=orbs[i];if(o.popped||o.escaped)continue;const dx=ex-o.x,dy=ey-o.y;if(dx*dx+dy*dy<=o.r*o.r){o.popped=true;const col=ORB[o.type].color||lvCol(level);if(o.type==='SHIELD'){if(lives<3){lives++;showBanner('SHIELD COLLECTED — ♥ RESTORED');burst(o.x,o.y,'#00f5a0',22);showPopup(o.x,o.y,'+♥','#00f5a0');}else{const bonus=multAt(level)*2;flux+=bonus;showBanner('SHIELD — FULL HP — BONUS FLUX!');burst(o.x,o.y,'#00f5a0',18);showPopup(o.x,o.y,'+'+fmtNum(bonus),'#00f5a0');}flash(levelEl);}else{const gained=fluxGain(level,o.type);flux+=gained;streak++;burst(o.x,o.y,col,o.type==='BOOST'?26:18);showPopup(o.x,o.y,(o.type==='BOOST'?'BOOST! ':'')+'+'+fmtNum(gained),col);flash(fluxEl);if(streak>0&&streak%10===0)showBanner(`🔥 ${streak} STREAK!`);xp++;if(xp>=xpToNext(level)){xp=0;level++;const extra=Math.min(Math.floor(level/4),3);for(let j=0;j<extra;j++)setTimeout(spawnOrb,j*160);showBanner(`▲ LEVEL ${level} — MULT ${fmtMult(level)}`);flash(levelEl,300);flash(multEl,300);}}const s=stor.load();stor.save({best:Math.max(flux,s.best||0),totalFlux:(s.totalFlux||0)+(flux-(s._lastFlux||0))});stor.save({_lastFlux:flux});updateHUD();break;}}}
canvas.addEventListener('touchstart',e=>{e.preventDefault();const r=canvas.getBoundingClientRect();for(const t of e.changedTouches)handleTap(t.clientX-r.left,t.clientY-r.top);},{passive:false});
canvas.addEventListener('click',e=>{const r=canvas.getBoundingClientRect();handleTap(e.clientX-r.left,e.clientY-r.top);});
function update(now){const dt=Math.min((now-lastTime)/16.67,3);lastTime=now;for(let i=orbs.length-1;i>=0;i--){const o=orbs[i];if(o.escaped){if(now-o.escapeT>440)orbs.splice(i,1);continue;}if(o.popped){orbs.splice(i,1);continue;}o.x+=o.vx*dt;o.y+=o.vy*dt;if(o.x-o.r<0){o.x=o.r;o.vx*=-1;}if(o.x+o.r>W){o.x=W-o.r;o.vx*=-1;}if(o.y-o.r<HUD_H){o.y=HUD_H+o.r;o.vy*=-1;}if(o.y+o.r>H){o.y=H-o.r;o.vy*=-1;}const age=now-o.born;if(age>=o.life){o.escaped=true;o.escapeT=now;streak=0;lives=Math.max(0,lives-1);screenFlash();updateHUD();if(lives<=0){endGame();return;}continue;}const fadeAt=o.life*.62;o.alpha=age>fadeAt?1-(age-fadeAt)/(o.life-fadeAt):1;o.phase=(o.phase+.052*dt)%(Math.PI*2);}for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=.08*dt;p.alpha-=.02*dt;if(p.alpha<=0)particles.splice(i,1);}}
function drawGrid(color){const S=32;ctx.fillStyle=color+'10';for(let x=S/2;x<W;x+=S)for(let y=HUD_H+S/2;y<H;y+=S){ctx.beginPath();ctx.arc(x,y,.85,0,Math.PI*2);ctx.fill();}}
function drawOrb(o,now){const col=ORB[o.type].color||lvCol(level);const pulse=1+Math.sin(o.phase)*.055;const pr=o.r*pulse;const ratio=Math.min((now-o.born)/o.life,1);if(o.escaped){const p2=(now-o.escapeT)/440;ctx.save();ctx.globalAlpha=(1-p2)*.65;ctx.strokeStyle='#ff0066';ctx.lineWidth=3;ctx.shadowColor='#ff0066';ctx.shadowBlur=18;ctx.beginPath();ctx.arc(o.x,o.y,o.r*(1+p2*.9),0,Math.PI*2);ctx.stroke();ctx.restore();return;}ctx.save();ctx.globalAlpha=o.alpha;ctx.shadowColor=col;ctx.shadowBlur=28*pulse;const g=ctx.createRadialGradient(o.x,o.y,0,o.x,o.y,pr);g.addColorStop(0,'#fff');g.addColorStop(.28,col);g.addColorStop(1,col+'00');ctx.beginPath();ctx.arc(o.x,o.y,pr,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();ctx.shadowBlur=0;ctx.strokeStyle=col+'55';ctx.lineWidth=1.5;ctx.stroke();ctx.beginPath();ctx.arc(o.x,o.y,pr+8,-Math.PI/2,-Math.PI/2+Math.PI*2*(1-ratio));ctx.strokeStyle=col;ctx.lineWidth=2.5;ctx.shadowColor=col;ctx.shadowBlur=10;ctx.stroke();const glyph=ORB[o.type].glyph||(level>1?fmtMult(level):null);if(glyph&&o.r>=18){ctx.shadowBlur=8;ctx.fillStyle='#fff';ctx.font=`800 ${Math.round(o.r*.58)}px Quicksand,sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(glyph,o.x,o.y);}ctx.restore();}
function draw(now){ctx.clearRect(0,0,W,H);ctx.fillStyle='#050810';ctx.fillRect(0,0,W,H);drawGrid(lvCol(level));for(const p of particles){ctx.save();ctx.globalAlpha=Math.max(0,p.alpha);ctx.shadowColor=p.color;ctx.shadowBlur=10;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.color;ctx.fill();ctx.restore();}for(const o of orbs)drawOrb(o,now);}
function loop(now){update(now);draw(now);if(running)animId=requestAnimationFrame(loop);}
function startGame(){orbs=[];particles=[];flux=0;xp=0;level=1;lives=3;streak=0;running=true;stor.save({_lastFlux:0});updateHUD();overlay.style.display='none';resize();scheduleSpawn();lastTime=performance.now();animId=requestAnimationFrame(loop);}
function endGame(){running=false;clearTimeout(spawnTimer);cancelAnimationFrame(animId);const s=stor.load();const isRec=flux>0&&flux>=(s.best||0);if(isRec)stor.save({best:flux});const games=(s.games||0)+1;stor.save({games,_lastFlux:0});const tf=s.totalFlux||0;overlay.innerHTML=`<div class="ov-eye">Run complete</div><div class="ov-title">FLUX</div>${isRec&&flux>0?'<div class="rec-pill">▲ NEW RECORD</div>':''}<div class="ov-big">${fmtNum(flux)}</div><div class="ov-sub">Level ${level} · ${fmtMult(level)} mult · ${xp} XP</div><div class="stats-grid"><div class="sc"><div class="v">${fmtNum(s.best||flux)}</div><div class="l">Best</div></div><div class="sc"><div class="v">${fmtNum(tf+flux)}</div><div class="l">Total Flux</div></div><div class="sc"><div class="v">${games}</div><div class="l">Runs</div></div></div><button id="btn">PLAY AGAIN</button>`;overlay.style.display='flex';document.getElementById('btn').addEventListener('click',startGame);}
function renderStartStats(){const s=stor.load();if(!s.best&&!s.games)return;const tf=s.totalFlux||0;startStats.style.display='grid';startStats.innerHTML=`<div class="sc"><div class="v">${fmtNum(s.best||0)}</div><div class="l">Best</div></div><div class="sc"><div class="v">${fmtNum(tf)}</div><div class="l">Total Flux</div></div><div class="sc"><div class="v">${s.games||0}</div><div class="l">Runs</div></div>`;}
renderStartStats();
document.getElementById('btn').addEventListener('click',startGame);
ctx.fillStyle='#050810';ctx.fillRect(0,0,W,H);
</script>
</body>
</html>
