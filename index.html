<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Círculos</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      width: 100%; height: 100%;
      background: #0a0a14;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff;
      touch-action: none;
    }

    #hud {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      padding: 12px 16px;
      padding-top: max(12px, env(safe-area-inset-top));
      background: rgba(10,10,20,0.95);
      border-bottom: 1px solid #1e293b;
      z-index: 10;
      gap: 4px;
    }

    .hud-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .hud-val {
      font-size: 1.5rem;
      font-weight: 800;
      color: #e2e8f0;
      line-height: 1;
    }

    .hud-lbl {
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #475569;
    }

    #lives-row {
      display: flex;
      gap: 5px;
      align-items: center;
      height: 1.5rem;
    }

    .heart {
      width: 14px; height: 14px;
      background: #ef4444;
      border-radius: 50% 50% 0 0;
      transform: rotate(-45deg);
      position: relative;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .heart::after {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      background: inherit;
      border-radius: 50%;
      left: 50%; top: 0;
      transform: translateX(-50%);
    }
    .heart.lost { background: #1e293b; }

    canvas {
      position: fixed;
      top: 0; left: 0;
      touch-action: none;
      cursor: crosshair;
    }

    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(10,10,20,0.93);
      z-index: 20;
      gap: 14px;
      padding: 24px;
      padding-top: max(24px, env(safe-area-inset-top));
    }

    #overlay h2 {
      font-size: 1.8rem;
      color: #38bdf8;
      letter-spacing: 4px;
      text-transform: uppercase;
      text-shadow: 0 0 20px #38bdf855;
    }

    .ov-big {
      font-size: 5rem;
      font-weight: 900;
      color: #e2e8f0;
      line-height: 1;
    }

    .ov-lbl {
      font-size: 0.75rem;
      color: #475569;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .ov-sub {
      font-size: 0.95rem;
      color: #64748b;
      text-align: center;
      line-height: 1.8;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      width: 100%;
      max-width: 340px;
    }

    .stat-box {
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 12px 8px;
      text-align: center;
    }

    .stat-box .v { font-size: 1.4rem; font-weight: 800; color: #38bdf8; }
    .stat-box .l { font-size: 0.6rem; color: #475569; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

    button {
      padding: 16px 48px;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 3px;
      border: 1.5px solid #38bdf8;
      border-radius: 50px;
      cursor: pointer;
      background: transparent;
      color: #38bdf8;
      text-transform: uppercase;
      transition: all 0.15s;
      min-width: 200px;
      -webkit-tap-highlight-color: transparent;
    }

    button:active { background: #38bdf8; color: #0a0a14; transform: scale(0.97); }

    #banner {
      position: fixed;
      top: 0; left: 0; right: 0;
      text-align: center;
      padding: 10px;
      padding-top: max(10px, env(safe-area-inset-top));
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: #0a0a14;
      background: #38bdf8;
      z-index: 30;
      opacity: 0;
      transform: translateY(-100%);
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
    }
    #banner.show { opacity: 1; transform: translateY(0); }

    #popup {
      position: fixed;
      pointer-events: none;
      font-size: 1.2rem;
      font-weight: 800;
      color: #38bdf8;
      text-shadow: 0 0 12px #38bdf8;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 15;
    }
  </style>
</head>
<body>

<div id="hud">
  <div class="hud-col">
    <div class="hud-val" id="score">0</div>
    <div class="hud-lbl">recolectados</div>
  </div>
  <div class="hud-col">
    <div class="hud-val" id="level">1</div>
    <div class="hud-lbl">nivel</div>
  </div>
  <div class="hud-col">
    <div id="lives-row">
      <div class="heart" id="h1"></div>
      <div class="heart" id="h2"></div>
      <div class="heart" id="h3"></div>
    </div>
    <div class="hud-lbl">vidas</div>
  </div>
  <div class="hud-col">
    <div class="hud-val" id="best-hud">0</div>
    <div class="hud-lbl">récord</div>
  </div>
</div>

<canvas id="canvas"></canvas>
<div id="banner"></div>
<div id="popup"></div>

<div id="overlay">
  <h2>Círculos</h2>
  <p class="ov-sub">
    Toca los círculos antes de que desaparezcan.<br>
    Cada 10 recolectados sube el nivel.<br>
    3 vidas — ¡que no se escapen!
  </p>
  <div class="stats-grid" id="start-stats"></div>
  <button id="btn">Empezar</button>
</div>

<script>
const SAVE_KEY = 'circulos_save';
function loadSave() { try { return JSON.parse(localStorage.getItem(SAVE_KEY)) || {}; } catch { return {}; } }
function writeSave(data) { try { const c = loadSave(); localStorage.setItem(SAVE_KEY, JSON.stringify({ ...c, ...data })); } catch {} }

const canvas  = document.getElementById('canvas');
const ctx     = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const banner  = document.getElementById('banner');
const popup   = document.getElementById('popup');
const scoreEl = document.getElementById('score');
const levelEl = document.getElementById('level');
const bestHud = document.getElementById('best-hud');
const hearts  = [document.getElementById('h1'), document.getElementById('h2'), document.getElementById('h3')];
const startStats = document.getElementById('start-stats');

let HUD_H = 0, W = 0, H = 0;

function resize() {
  const hudEl = document.getElementById('hud');
  HUD_H = hudEl.getBoundingClientRect().height;
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  W = canvas.width; H = canvas.height;
}
resize();
window.addEventListener('resize', resize);

let circles = [], particles = [];
let score = 0, level = 1, lives = 3, collected = 0;
let running = false, animId = null, spawnTimer = null, lastTime = 0;

function getConfig() {
  return {
    spd:  1.4 + (level - 1) * 0.25,
    life: Math.max(1400, 4200 - (level - 1) * 200),
    rate: Math.max(550,  2000 - (level - 1) * 130),
    r:    Math.max(18,   32   - Math.floor((level - 1) / 2) * 2),
  };
}

function rand(a, b) { return Math.random() * (b - a) + a; }

function spawnCircle() {
  if (!running) return;
  const { spd, life, r } = getConfig();
  const angle = Math.random() * Math.PI * 2;
  circles.push({ x: rand(r+8, W-r-8), y: rand(HUD_H+r+8, H-r-8), r,
    vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd,
    born: performance.now(), life, alpha: 1, pulse: rand(0, Math.PI*2), popped: false });
  scheduleSpawn();
}

function scheduleSpawn() {
  clearTimeout(spawnTimer);
  spawnTimer = setTimeout(spawnCircle, getConfig().rate + rand(-80, 80));
}

function spawnParticles(x, y) {
  for (let i = 0; i < 14; i++) {
    const a = (Math.PI*2*i)/14 + rand(-0.2,0.2), s = rand(2.5,6);
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, alpha: 1, r: rand(2,5) });
  }
}

function showPopup(x, y, text) {
  popup.textContent = text;
  popup.style.left = (x-12)+'px'; popup.style.top = (y-40)+'px';
  popup.style.opacity = '1';
  clearTimeout(popup._t);
  popup._t = setTimeout(() => { popup.style.opacity = '0'; }, 650);
}

function showBanner(text) {
  banner.textContent = text; banner.classList.add('show');
  clearTimeout(banner._t);
  banner._t = setTimeout(() => { banner.classList.remove('show'); }, 1600);
}

function loseLife() {
  lives = Math.max(0, lives - 1);
  hearts.forEach((h, i) => h.classList.toggle('lost', i >= lives));
  if (lives <= 0) endGame();
}

function handleTap(ex, ey) {
  if (!running) return;
  for (let i = circles.length - 1; i >= 0; i--) {
    const c = circles[i];
    if (c.popped) continue;
    const dx = ex - c.x, dy = ey - c.y;
    if (dx*dx + dy*dy <= c.r*c.r) {
      c.popped = true; collected++; score = collected;
      scoreEl.textContent = score;
      spawnParticles(c.x, c.y);
      showPopup(c.x, c.y, '+1');
      const save = loadSave();
      const best = Math.max(score, save.best || 0);
      writeSave({ best, total: (save.total||0)+1 });
      bestHud.textContent = best;
      const nl = Math.floor(collected/10)+1;
      if (nl > level) { level = nl; levelEl.textContent = level; showBanner(`¡NIVEL ${level}! — Más rápido`); }
      break;
    }
  }
}

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  for (const t of e.changedTouches) handleTap(t.clientX - rect.left, t.clientY - rect.top);
}, { passive: false });

canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  handleTap(e.clientX - rect.left, e.clientY - rect.top);
});

function update(now) {
  const dt = Math.min((now - lastTime) / 16.67, 3);
  lastTime = now;
  for (let i = circles.length - 1; i >= 0; i--) {
    const c = circles[i];
    if (c.popped) { circles.splice(i,1); continue; }
    c.x += c.vx*dt; c.y += c.vy*dt;
    if (c.x-c.r < 0)     { c.x = c.r;    c.vx *= -1; }
    if (c.x+c.r > W)     { c.x = W-c.r;  c.vx *= -1; }
    if (c.y-c.r < HUD_H) { c.y = HUD_H+c.r; c.vy *= -1; }
    if (c.y+c.r > H)     { c.y = H-c.r;  c.vy *= -1; }
    const age = now - c.born;
    if (age >= c.life) { circles.splice(i,1); loseLife(); continue; }
    const fadeAt = c.life * 0.62;
    c.alpha = age > fadeAt ? 1-(age-fadeAt)/(c.life-fadeAt) : 1;
    c.pulse = (c.pulse + 0.055*dt) % (Math.PI*2);
  }
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx*dt; p.y += p.vy*dt; p.vy += 0.1*dt; p.alpha -= 0.025*dt;
    if (p.alpha <= 0) particles.splice(i,1);
  }
}

function draw() {
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = '#0a0a14'; ctx.fillRect(0,0,W,H);
  for (const p of particles) {
    ctx.save(); ctx.globalAlpha = Math.max(0,p.alpha);
    ctx.shadowColor='#38bdf8'; ctx.shadowBlur=6;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle='#7dd3fc'; ctx.fill(); ctx.restore();
  }
  for (const c of circles) {
    const pulse = 1+Math.sin(c.pulse)*0.06, pr = c.r*pulse;
    const ratio = Math.min((performance.now()-c.born)/c.life,1);
    ctx.save(); ctx.globalAlpha = c.alpha;
    ctx.shadowColor='#38bdf8'; ctx.shadowBlur=20*pulse;
    const g = ctx.createRadialGradient(c.x,c.y,0,c.x,c.y,pr);
    g.addColorStop(0,'#bae6fd'); g.addColorStop(0.5,'#38bdf8'); g.addColorStop(1,'#0284c7');
    ctx.beginPath(); ctx.arc(c.x,c.y,pr,0,Math.PI*2);
    ctx.fillStyle=g; ctx.fill();
    ctx.shadowBlur=0;
    ctx.strokeStyle=`rgba(255,255,255,${0.2*c.alpha})`; ctx.lineWidth=2; ctx.stroke();
    ctx.beginPath();
    ctx.arc(c.x,c.y,pr+6,-Math.PI/2,-Math.PI/2+Math.PI*2*(1-ratio));
    ctx.strokeStyle=`rgba(56,189,248,${0.55*c.alpha})`; ctx.lineWidth=2.5; ctx.stroke();
    ctx.restore();
  }
}

function loop(now) { update(now); draw(); if (running) animId = requestAnimationFrame(loop); }

function startGame() {
  circles=[]; particles=[]; score=0; level=1; lives=3; collected=0;
  running=true;
  scoreEl.textContent='0'; levelEl.textContent='1';
  bestHud.textContent = loadSave().best || 0;
  hearts.forEach((h,i) => h.classList.toggle('lost', i >= lives));
  overlay.style.display='none';
  resize(); scheduleSpawn();
  lastTime=performance.now();
  animId=requestAnimationFrame(loop);
}

function endGame() {
  running=false; clearTimeout(spawnTimer); cancelAnimationFrame(animId);
  const save=loadSave();
  const isRecord = score > 0 && score >= (save.best||0);
  if (isRecord) writeSave({ best: score });
  overlay.innerHTML = `
    <h2>${isRecord && score>0 ? '¡Récord!' : 'Juego terminado'}</h2>
    <div class="ov-big">${score}</div>
    <div class="ov-lbl">recolectados · nivel ${level}</div>
    <div class="stats-grid">
      <div class="stat-box"><div class="v">${save.best||score}</div><div class="l">Récord</div></div>
      <div class="stat-box"><div class="v">${(save.total||0)+score}</div><div class="l">Total histórico</div></div>
      <div class="stat-box"><div class="v">${(save.games||0)+1}</div><div class="l">Partidas</div></div>
    </div>
    <button id="btn">Jugar de nuevo</button>
  `;
  writeSave({ games: (save.games||0)+1 });
  overlay.style.display='flex';
  document.getElementById('btn').addEventListener('click', startGame);
}

function renderStartStats() {
  const s = loadSave();
  if (!s.best && !s.total && !s.games) { startStats.style.display='none'; return; }
  startStats.style.display='grid';
  startStats.innerHTML = `
    <div class="stat-box"><div class="v">${s.best||0}</div><div class="l">Récord</div></div>
    <div class="stat-box"><div class="v">${s.total||0}</div><div class="l">Recolectados</div></div>
    <div class="stat-box"><div class="v">${s.games||0}</div><div class="l">Partidas</div></div>
  `;
}

renderStartStats();
document.getElementById('btn').addEventListener('click', startGame);
ctx.fillStyle='#0a0a14'; ctx.fillRect(0,0,W,H);
</script>
</body>
</html>
